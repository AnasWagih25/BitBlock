<!DOCTYPE html>
<html>
<head>
  <script src="node_modules/blockly/blockly_compressed.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    #blocklyDiv { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="blocklyDiv"></div>
  <script>
    var ws = Blockly.inject('blocklyDiv', {
      move: { scrollbars: true, drag: true, wheel: true }
    });

    const div = document.getElementById('blocklyDiv');
    div.addEventListener('mousedown', (e) => {
      if (e.button === 1) { // middle
        e.preventDefault();
        e.stopPropagation();
        
        let startX = e.clientX;
        let startY = e.clientY;
        
        // Use metrics to scroll
        const initialMetrics = ws.getMetrics();
        const startScrollX = initialMetrics.viewLeft;
        const startScrollY = initialMetrics.viewTop;
        
        const onMove = (me) => {
          const dx = me.clientX - startX;
          const dy = me.clientY - startY;
          ws.scroll(-dx, -dy);
        };
        const onUp = (ue) => {
          if (ue.button === 1) {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      }
    }, { capture: true });
  </script>
</body>
</html>
